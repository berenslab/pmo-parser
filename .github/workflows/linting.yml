name: Linting
on: [push, pull_request]
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
    ruff:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout Code
          uses: actions/checkout@v4
        - name: Run Ruff
          uses: astral-sh/ruff-action@v1
          with:
            src: "src/"
            changed-files: "true"
