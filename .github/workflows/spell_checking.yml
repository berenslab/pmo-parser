name: Spell Checking
on: [push, pull_request]
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
    typos:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: crate-ci/typos@v1.29.10
